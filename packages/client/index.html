<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mugen - Structural Planning Tool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }
    #root { width: 100%; height: 100%; }
    .tool-btn-wrap .tool-tooltip {
      display: none; position: absolute; left: 105%; top: 50%; transform: translateY(-50%);
      background: #f85149; color: #fff; font-size: 10px; padding: 4px 8px; border-radius: 4px;
      white-space: nowrap; z-index: 100; pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .tool-btn-wrap:hover .tool-tooltip { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
